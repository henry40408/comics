<!doctype html>
<html lang="en">
  <head>
    <title>{{ books.len() }} book(s) | Comics {{ version }}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // set theme before paint to avoid a flash of the wrong palette
      (function () {
        var t =
          localStorage.getItem("comics-theme") ||
          (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link
      href="https://fonts.bunny.net/css?family=hanken-grotesk:400,500,600|shippori-mincho:500,700"
      rel="stylesheet"
    />
    <link href="/assets/app.css?v={{ assets_version }}" rel="stylesheet" />
    <script src="/assets/app.js?v={{ assets_version }}" defer></script>
  </head>

  <body class="lib">
    <div class="layout">
      <aside>
        <div class="mark"></div>
        <div class="spine">漫画書架<span class="en">／ COMICS</span></div>
        <div class="asidebot">
          <button class="themebtn" id="theme" type="button" title="Toggle theme" aria-label="Toggle theme">◐</button>
          <div class="ver">{{ version }}</div>
        </div>
      </aside>

      <main>
        <div class="head">
          <h1>Library<span class="dot">.</span></h1>
          <div class="stat">
            <div><b>{{ books.len() }}</b> volume(s)</div>
            <div>
              scanned
              <time is="x-time" datetime="{{ scanned_at }}">{{ scanned_at }}</time>
              ·
              <time datetime="P{{ scan_duration / 1000.0 }}S">{{ scan_duration }}ms</time>
            </div>
          </div>
        </div>

        <div class="rule"></div>

        <div class="controls">
          <form method="POST" action="/rescan">
            <button class="lbtn" type="submit">Re-scan</button>
          </form>
          <form method="POST" action="/shuffle">
            <button class="lbtn key" type="submit">Shuffle</button>
          </form>
          <span class="note">所蔵 {{ books.len() }} 冊</span>
        </div>

        <div class="grid">
          {% for b in books %}
          <a class="card" href="/book/{{ b.id }}">
            <div class="cover">
              <img
                src="/data/{{ b.cover.id }}"
                width="{{ b.cover.dimension.width }}"
                height="{{ b.cover.dimension.height }}"
                alt="{{ b.title }}"
                loading="lazy"
              />
              <span class="idx">{{ loop.index }}</span>
            </div>
            <div class="info">
              <div class="t">{{ b.title }}</div>
              <div class="p">{{ b.pages.len() }} pages</div>
            </div>
          </a>
          {% endfor %}
        </div>
      </main>
    </div>
  </body>
</html>
